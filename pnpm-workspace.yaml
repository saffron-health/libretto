packages:
  - "apps/*"
  - "benchmarks"
  - "evals"
  - "packages/*"

minimumReleaseAge: 10080
minimumReleaseAgeStrict: false
preferFullMetadata: true
minimumReleaseAgeExclude:
  - affordance
  - libretto

enablePrePostScripts: false

blockExoticSubdeps: true

allowBuilds:
  esbuild: true
  fallow: false
  glimpseui: false
  keytar: true
  koffi: true
  protobufjs: true
  puppeteer: true
  sharp: true
