packages:
  - "apps/*"
  - "benchmarks"
  - "docs"
  - "evals"
  - "packages/*"

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@holocron.so/*"
  - "@mintlify/*"
  - affordance
  - framer-motion
  - libretto
  - lodash
  - mint
  - motion
  - safe-mdx
  - spiceflow
  - "@spiceflow/*"

enablePrePostScripts: false

blockExoticSubdeps: true

allowBuilds:
  '@google/genai': false
  esbuild: true
  fallow: false
  glimpseui: false
  keytar: true
  koffi: true
  protobufjs: true
  puppeteer: true
  sharp: true
  workerd: true
