name: Evals

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "evals/**"
      - ".github/workflows/evals.yml"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  evals:
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate eval credentials
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY secret is required to run evals." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run evals
        id: run_evals
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pnpm evals --output "${RUNNER_TEMP}/eval-run"

      - name: Summarize eval results
        id: summarize_evals
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          if pnpm evals summary "${RUNNER_TEMP}/eval-run"; then
            cat "${RUNNER_TEMP}/eval-run/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Eval summary generation failed. The eval runner may have crashed before producing completed records." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            ${{ runner.temp }}/eval-run/run.json
            ${{ runner.temp }}/eval-run/summary.json
            ${{ runner.temp }}/eval-run/summary.md
            ${{ runner.temp }}/eval-run/cases/**/result.json
            !${{ runner.temp }}/eval-run/cases/**/transcript.jsonl
            !${{ runner.temp }}/eval-run/cases/**/*events.jsonl
            !${{ runner.temp }}/eval-run/cases/**/*transcript.md

      - name: Post sticky eval summary comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          EVAL_SUMMARY_PATH: ${{ runner.temp }}/eval-run/summary.md
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("node:fs");

            const marker = "<!-- libretto-eval-results -->";
            if (!fs.existsSync(process.env.EVAL_SUMMARY_PATH)) {
              core.warning(`Eval summary not found: ${process.env.EVAL_SUMMARY_PATH}`);
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.pull_request.number;
            const summary = fs.readFileSync(process.env.EVAL_SUMMARY_PATH, "utf8").trim();
            const body = [
              marker,
              "# Eval Report",
              "",
              `Run: ${process.env.RUN_URL}`,
              "",
              summary,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments
              .filter((comment) => (comment.body ?? "").startsWith(marker))
              .sort((a, b) => Date.parse(b.updated_at) - Date.parse(a.updated_at))[0];

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Enforce eval success
        if: always()
        run: |
          if [ "${{ steps.run_evals.outcome }}" != "success" ]; then
            echo "Eval run failed. See logs and the eval summary for details." >&2
            exit 1
          fi
          if [ "${{ steps.summarize_evals.outcome }}" != "success" ]; then
            echo "Eval summary validation failed. The run may have produced malformed or zero completed records." >&2
            exit 1
          fi
