name: Verify issue 408 on Windows

on:
  push:
    branches:
      - verify-408-windows-node24

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Show environment
        shell: pwsh
        run: |
          node --version
          npm --version
          pnpm --version
          systeminfo | Select-String -Pattern '^OS Name|^OS Version'

      - name: Build local Libretto
        shell: pwsh
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter affordance build
          pnpm --filter libretto build
          pnpm exec playwright install chromium

      - name: Run local Libretto smoke workflow
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Location packages/libretto
          New-Item -ItemType Directory -Force tmp-workflows | Out-Null
          @'
          import { workflow } from "../dist/index.js";

          export default workflow("smoke", async ({ page }) => {
            await page.goto("data:text/html,<title>ok</title>");
            return { ok: true };
          });
          '@ | Set-Content -Encoding UTF8 tmp-workflows/smoke.ts

          Write-Host "Running Libretto smoke workflow:"
          node dist/index.js run tmp-workflows/smoke.ts --headless
          $exitCode = $LASTEXITCODE
          Write-Host "libretto exit code: $exitCode"

          Write-Host "Session logs:"
          if (Test-Path .libretto) {
            Get-ChildItem -Recurse .libretto | Select-Object FullName,Length,LastWriteTime | Format-Table -AutoSize
            Get-ChildItem -Recurse .libretto -Filter *.jsonl | ForEach-Object {
              Write-Host "--- $($_.FullName) ---"
              Get-Content $_.FullName
            }
          } else {
            Write-Host "No .libretto directory found"
          }

          exit $exitCode
